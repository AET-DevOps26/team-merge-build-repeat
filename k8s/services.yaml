apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: merge-build-repeat
spec:
  type: ClusterIP
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP

---
apiVersion: v1
kind: Service
metadata:
  name: application
  namespace: merge-build-repeat
spec:
  type: ClusterIP
  selector:
    app: application
  ports:
    - port: 8081
      targetPort: 8080
      protocol: TCP


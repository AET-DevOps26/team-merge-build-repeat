apiVersion: v1
kind: Secret
metadata:
  name: application-database-secret
  namespace: merge-build-repeat
type: Opaque
stringData:
  password: "alnvicawlae"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: application-database-pvc
  namespace: merge-build-repeat
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Mi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: application-database
  namespace: merge-build-repeat
spec:
  serviceName: application-database
  replicas: 1
  selector:
    matchLabels:
      app: application-database
  template:
    metadata:
      labels:
        app: application-database
    spec:
      containers:
        - name: postgres
          image: postgres:17
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_DB
              value: "game_database"
            - name: POSTGRES_USER
              value: "postgres"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: application-database-secret
                  key: password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U postgres
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U postgres
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: application-database-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: application-database
  namespace: merge-build-repeat
spec:
  clusterIP: None
  selector:
    app: application-database
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
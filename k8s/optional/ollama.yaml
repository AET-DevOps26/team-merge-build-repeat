apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: merge-build-repeat
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: ollama
  ports:
    - name: http
      port: 11434
      targetPort: http
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-data
  namespace: merge-build-repeat
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: merge-build-repeat
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ollama
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ollama
    spec:
      containers:
        - name: ollama
          image: ghcr.io/aet-devops26/team-merge-build-repeat-ollama:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 11434
          env:
            - name: OLLAMA_MODEL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: OLLAMA_MODEL
            - name: OLLAMA_CONTEXT_LENGTH
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: OLLAMA_CONTEXT_LENGTH
          volumeMounts:
            - name: data
              mountPath: /root/.ollama
          resources:
            requests:
              memory: 1Gi
              cpu: 500m
            limits:
              memory: 4Gi
              cpu: "2"
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - ollama show "$OLLAMA_MODEL" >/dev/null 2>&1
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: ollama-data

apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: merge-build-repeat
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s

    scrape_configs:
      - job_name: prometheus
        scrape_interval: 5s
        static_configs:
          - targets: [localhost:9090]

      - job_name: chat-service
        metrics_path: __CHAT_CONTEXT_PATH__/actuator/prometheus
        static_configs:
          - targets: [chat:8080]

      - job_name: application-service
        metrics_path: __APPLICATION_CONTEXT_PATH__/actuator/prometheus
        static_configs:
          - targets: [application:8080]

      - job_name: genai-service
        metrics_path: /metrics
        static_configs:
          - targets: [genai:8080]

      - job_name: game-engine-service
        metrics_path: /metrics
        static_configs:
          - targets: [game-engine:8080]

      - job_name: app-databases
        static_configs:
          - targets: [app-db-exporter:9187]

      - job_name: chat-databases
        static_configs:
          - targets: [chat-db-exporter:9187]
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-data
  namespace: merge-build-repeat
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-db-exporter
  namespace: merge-build-repeat
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: app-db-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: app-db-exporter
    spec:
      initContainers:
        - name: wait-for-application-database
          image: postgres:17
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - until pg_isready -h application-database -p 5432; do sleep 2; done
          resources:
            requests:
              memory: 32Mi
              cpu: 10m
            limits:
              memory: 64Mi
              cpu: 50m
      containers:
        - name: postgres-exporter
          image: ghcr.io/aet-devops26/team-merge-build-repeat-postgres-exporter
          imagePullPolicy: Always
          ports:
            - name: metrics
              containerPort: 9187
          env:
            - name: DATABASE_NAME
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: APP_DATABASE_NAME
            - name: DATA_SOURCE_URI
              value: application-database:5432/$(DATABASE_NAME)?sslmode=disable
            - name: DATA_SOURCE_USER
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: APP_DATABASE_USER
            - name: DATA_SOURCE_PASS_FILE
              value: /etc/secrets/app_database_password
            - name: PG_EXPORTER_EXTEND_QUERY_PATH
              value: /etc/postgres_exporter/queries.yaml
          volumeMounts:
            - name: app-secret
              mountPath: /etc/secrets
              readOnly: true
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests:
              memory: 32Mi
              cpu: 10m
            limits:
              memory: 128Mi
              cpu: 100m
      volumes:
        - name: app-secret
          secret:
            secretName: app-secrets
            items:
              - key: app_database_password
                path: app_database_password
---

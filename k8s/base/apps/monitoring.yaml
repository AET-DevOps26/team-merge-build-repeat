apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: merge-build-repeat
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  template:
    metadata:
      labels:
        app.kubernetes.io/name: prometheus
    spec:
      securityContext:
        fsGroup: 65534
      initContainers:
        - name: render-prometheus-config
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          env:
            - name: APPLICATION_CONTEXT_PATH
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: APPLICATION_CONTEXT_PATH
            - name: CHAT_CONTEXT_PATH
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: CHAT_CONTEXT_PATH
          command:
            - /bin/sh
            - -c
            - >-
              sed -e "s|__APPLICATION_CONTEXT_PATH__|$APPLICATION_CONTEXT_PATH|g"
              -e "s|__CHAT_CONTEXT_PATH__|$CHAT_CONTEXT_PATH|g"
              /config/prometheus.yml > /rendered/prometheus.yml
          volumeMounts:
            - name: config-template
              mountPath: /config
              readOnly: true
            - name: config
              mountPath: /rendered
          resources:
            requests:
              memory: 32Mi
              cpu: 10m
            limits:
              memory: 64Mi
              cpu: 50m
      containers:
        - name: prometheus
          image: ghcr.io/aet-devops26/team-merge-build-repeat-prometheus
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 9090
          args:
            - --config.file=/etc/prometheus/prometheus.yml
          volumeMounts:
            - name: data
              mountPath: /prometheus
            - name: config
              mountPath: /etc/prometheus
              readOnly: true
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests:
              memory: 32Mi
              cpu: 10m
            limits:
              memory: 512Mi
              cpu: 250m
      volumes:
        - name: config-template
          configMap:
            name: prometheus-config
        - name: config
          emptyDir: {}
        - name: data
          persistentVolumeClaim:
            claimName: prometheus-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-data
  namespace: merge-build-repeat
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: merge-build-repeat
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grafana
    spec:
      securityContext:
        fsGroup: 472
      containers:
        - name: grafana
          image: ghcr.io/aet-devops26/team-merge-build-repeat-grafana
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: PUBLIC_IP_ADDR
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: PUBLIC_IP_ADDR
            - name: GF_SERVER_ROOT_URL
              value: http://$(PUBLIC_IP_ADDR)/grafana/
            - name: GF_SERVER_SERVE_FROM_SUB_PATH
              value: "true"
          volumeMounts:
            - name: data
              mountPath: /var/lib/grafana
          readinessProbe:
            httpGet:
              path: /grafana/api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /grafana/api/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests:
              memory: 32Mi
              cpu: 10m
            limits:
              memory: 256Mi
              cpu: 200m
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: grafana-data

apiVersion: apps/v1
kind: Deployment
metadata:
  name: application
  namespace: merge-build-repeat
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: application
  template:
    metadata:
      labels:
        app.kubernetes.io/name: application
    spec:
      initContainers:
        - name: wait-for-application-database
          image: postgres:17
          imagePullPolicy: IfNotPresent
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: APP_DATABASE_NAME
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: APP_DATABASE_USER
          command:
            - /bin/sh
            - -c
            - |
              until pg_isready -h application-database -p 5432 -U "$POSTGRES_USER" -d "$POSTGRES_DB"; do
                echo "Waiting for application-database..."
                sleep 2
              done
          resources:
            requests:
              memory: 32Mi
              cpu: 10m
            limits:
              memory: 64Mi
              cpu: 100m
      containers:
        - name: application
          image: ghcr.io/aet-devops26/team-merge-build-repeat-application
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: SERVER_SERVLET_CONTEXT_PATH
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: APPLICATION_CONTEXT_PATH
            - name: DATABASE_HOST
              value: application-database
            - name: DATABASE_PORT
              value: "5432"
            - name: DATABASE_NAME
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: APP_DATABASE_NAME
            - name: DATABASE_USER
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: APP_DATABASE_USER
            - name: SPRING_JPA_HIBERNATE_DDL_AUTO
              value: none
            - name: SPRING_JPA_SHOW_SQL
              value: "false"
            - name: SPRING_CONFIG_IMPORT
              value: optional:configtree:/etc/secrets/
          volumeMounts:
            - name: application-secret
              mountPath: /etc/secrets
              readOnly: true
          resources:
            requests:
              memory: 256Mi
              cpu: 250m
            limits:
              memory: 512Mi
              cpu: 500m
          livenessProbe:
            httpGet:
              path: /application/actuator/health
              port: http
            initialDelaySeconds: 45
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /application/actuator/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6
      volumes:
        - name: application-secret
          secret:
            secretName: app-secrets
            items:
              - key: app_database_password
                path: spring.datasource.password

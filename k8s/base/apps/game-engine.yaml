apiVersion: apps/v1
kind: Deployment
metadata:
  name: game-engine
  namespace: merge-build-repeat
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: game-engine
  template:
    metadata:
      labels:
        app.kubernetes.io/name: game-engine
    spec:
      containers:
        - name: game-engine
          image: ghcr.io/aet-devops26/team-merge-build-repeat-game-engine
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: GAME_ENGINE_ROOT_PATH
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: GAME_ENGINE_ROOT_PATH
          resources:
            requests:
              memory: 32Mi
              cpu: 10m
            limits:
              memory: 128Mi
              cpu: 100m
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6

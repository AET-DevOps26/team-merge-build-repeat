apiVersion: apps/v1
kind: Deployment
metadata:
  name: application
  namespace: merge-build-repeat
spec:
  replicas: 1
  selector:
    matchLabels:
      app: application
  template:
    metadata:
      labels:
        app: application
    spec:
      containers:
        - name: application
          image: team-merge-build-repeat-app:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: CHAT_DATABASE_BASE_URL
              value: "http://chat-database:8080"
            - name: GENAI_BASE_URL
              value: "http://genai:8000"
            - name: DATABASE_HOST
              value: "application-database"
            - name: DATABASE_PORT
              value: "5432"
            - name: DATABASE_NAME
              value: "game_database"
            - name: DATABASE_USER
              value: "postgres"
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: application-database-secret
                  key: password
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 5
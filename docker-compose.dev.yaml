services:
  caddy:
    image: caddy:2-alpine
    profiles: [ "proxy" ]
    ports:
      - "127.0.0.1:${CADDY_HTTP_PORT:-8088}:80"
    volumes:
      - ./services/caddy/Caddyfile.local:/etc/caddy/Caddyfile:ro

  frontend:
    build:
      context: ./services/frontend
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-https://pwjnldzqwwagnxjycfaq.supabase.co}
        VITE_SUPABASE_PUBLISHABLE_KEY: ${VITE_SUPABASE_PUBLISHABLE_KEY:-sb_publishable_ILaMZuzBfV5NOnKfCQdJJQ_ESpvjbBt}
    ports:
      - "127.0.0.1:${FRONTEND_HOST_PORT:-8090}:8080"
    environment:
      - DOCKER_ENV=true

  frontend-dev:
    profiles: [ "dev" ]
    pull_policy: build
    build:
      context: ./services/frontend
      dockerfile: dev.Dockerfile
    ports:
      - "127.0.0.1:${FRONTEND_DEV_HOST_PORT:-5174}:5173"
    volumes:
      - ./services/frontend:/app
      - /app/node_modules
    environment:
      - DOCKER_ENV=true
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL:-https://pwjnldzqwwagnxjycfaq.supabase.co}
      - VITE_SUPABASE_PUBLISHABLE_KEY=${VITE_SUPABASE_PUBLISHABLE_KEY:-sb_publishable_ILaMZuzBfV5NOnKfCQdJJQ_ESpvjbBt}
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://127.0.0.1:5173/" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  genai:
    pull_policy: build
    build:
      context: ./services/genai
    ports:
      - "127.0.0.1:${GENAI_HOST_PORT:-8002}:8080"

  ollama:
    pull_policy: build
    build:
      context: ./services/ollama
    ports:
      - "127.0.0.1:${OLLAMA_PORT:-11434}:11434"

  application:
    pull_policy: build
    build:
      context: ./services/application
    ports:
      - "127.0.0.1:${APP_HOST_PORT:-8081}:8080"

  application-database:
    ports:
      - "127.0.0.1:${APP_DATABASE_POSTGRES_PORT:-5432}:5432"

  chat:
    pull_policy: build
    build:
      context: ./services/chat-database
    ports:
      - "127.0.0.1:${CHAT_DATABASE_API_PORT:-8083}:8080"
    environment:
      SUPABASE_AUTH_ISSUER: ${SUPABASE_AUTH_ISSUER:-https://pwjnldzqwwagnxjycfaq.supabase.co/auth/v1}
      SUPABASE_AUTH_JWKS_URI: ${SUPABASE_AUTH_JWKS_URI:-https://pwjnldzqwwagnxjycfaq.supabase.co/auth/v1/.well-known/jwks.json}

  chat-database:
    ports:
      - "127.0.0.1:${CHAT_DATABASE_POSTGRES_PORT:-5431}:5432"

  game-engine:
    pull_policy: build
    build:
      context: ./services/game-engine
    ports:
      - "127.0.0.1:${GAME_ENGINE_HOST_PORT:-8082}:8080"

  prometheus:
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-9090}:9090"


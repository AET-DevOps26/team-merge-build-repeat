services:
  caddy:
    image: caddy:2-alpine
    profiles: [ "proxy" ]
    ports:
      - "127.0.0.1:${CADDY_HTTP_PORT:-8088}:80"
    volumes:
      - ./services/caddy/Caddyfile.local:/etc/caddy/Caddyfile:ro

  frontend:
    pull_policy: build
    build:
      context: ./services/frontend
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-https://pwjnldzqwwagnxjycfaq.supabase.co}
        VITE_SUPABASE_PUBLISHABLE_KEY: ${VITE_SUPABASE_PUBLISHABLE_KEY:-sb_publishable_ILaMZuzBfV5NOnKfCQdJJQ_ESpvjbBt}
    ports:
      - "127.0.0.1:${FRONTEND_HOST_PORT:-8090}:8080"
    environment:
      - DOCKER_ENV=true

  frontend-dev:
    profiles: [ "dev" ]
    pull_policy: build
    build:
      context: ./services/frontend
      dockerfile: dev.Dockerfile
    ports:
      - "127.0.0.1:${FRONTEND_DEV_HOST_PORT:-5174}:5173"
    volumes:
      - ./services/frontend:/app
      - /app/node_modules
    environment:
      - DOCKER_ENV=true
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL:-https://pwjnldzqwwagnxjycfaq.supabase.co}
      - VITE_SUPABASE_PUBLISHABLE_KEY=${VITE_SUPABASE_PUBLISHABLE_KEY:-sb_publishable_ILaMZuzBfV5NOnKfCQdJJQ_ESpvjbBt}
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://127.0.0.1:5173/" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  genai:
    pull_policy: build
    build:
      context: ./services/genai
    ports:
      - "127.0.0.1:${GENAI_HOST_PORT:-8002}:8080"
    environment:
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:4b}
    depends_on:
      ollama:
        condition: service_healthy
        required: false

  ollama:
    pull_policy: build
    build:
      context: ./services/ollama
    profiles: ["local-llm"]
    ports:
      - "127.0.0.1:${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:4b}
      OLLAMA_CONTEXT_LENGTH: ${OLLAMA_CONTEXT_LENGTH:-8192}
    healthcheck:
      test: ["CMD-SHELL", 'ollama show "$$OLLAMA_MODEL" >/dev/null 2>&1']
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 10s

  application:
    pull_policy: build
    build:
      context: ./services/application
    ports:
      - "127.0.0.1:${APP_HOST_PORT:-8081}:8080"
    environment:
      SUPABASE_AUTH_JWKS_URI: ${SUPABASE_AUTH_JWKS_URI:-https://pwjnldzqwwagnxjycfaq.supabase.co/auth/v1/.well-known/jwks.json}

  application-database:
    pull_policy: build
    build:
      context: ./services/postgres
    ports:
      - "127.0.0.1:${APP_DATABASE_PORT:-5432}:5432"

  chat:
    pull_policy: build
    build:
      context: ./services/chat-database
    ports:
      - "127.0.0.1:${CHAT_DATABASE_API_PORT:-8083}:8080"
    environment:
      SUPABASE_AUTH_ISSUER: ${SUPABASE_AUTH_ISSUER:-https://pwjnldzqwwagnxjycfaq.supabase.co/auth/v1}
      SUPABASE_AUTH_JWKS_URI: ${SUPABASE_AUTH_JWKS_URI:-https://pwjnldzqwwagnxjycfaq.supabase.co/auth/v1/.well-known/jwks.json}

  chat-database:
    pull_policy: build
    build:
      context: ./services/postgres
    ports:
      - "127.0.0.1:${CHAT_DATABASE_POSTGRES_PORT:-5431}:5432"

  game-engine:
    pull_policy: build
    build:
      context: ./services/game-engine
    ports:
      - "127.0.0.1:${GAME_ENGINE_HOST_PORT:-8082}:8080"

  app-db-exporter:
    pull_policy: build
    build:
      context: ./services/prometheus
      dockerfile: postgres-exporter.Dockerfile
    ports:
      - "127.0.0.1:${APP_DB_EXPORTER_PORT:-8023}:9187"

  chat-db-exporter:
    pull_policy: build
    build:
      context: ./services/prometheus
      dockerfile: postgres-exporter.Dockerfile
    ports:
      - "127.0.0.1:${CHAT_DB_EXPORTER_PORT:-8022}:9187"

  prometheus:
    pull_policy: build
    build:
      context: ./services/prometheus
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-8021}:9090"

  grafana:
    pull_policy: build
    build:
      context: ./services/grafana
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-8020}:3000"
      
volumes:
  ollama-data:

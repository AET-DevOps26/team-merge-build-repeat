spring:
  config:
    import: ${SPRING_CONFIG_IMPORT:optional:configtree:/run/secrets/}
  application:
    name: merge-build-repeat
  datasource:
    url: jdbc:postgresql://${DATABASE_HOST:application-database}:${DATABASE_PORT:5432}/${DATABASE_NAME:game_database}
    username: ${DATABASE_USER:postgres}
    password: ${DATABASE_PASSWORD:alnvicawlae}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${SUPABASE_AUTH_JWKS_URI}

game-engine:
  url: ${GAME_ENGINE_URL:http://game-engine:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  info:
    build:
      enabled: true

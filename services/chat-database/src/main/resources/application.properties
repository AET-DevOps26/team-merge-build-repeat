spring.application.name=chat-database-service
spring.config.import=${SPRING_CONFIG_IMPORT:optional:configtree:/run/secrets/}
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/chat_database}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:chat_user}
spring.flyway.enabled=${SPRING_FLYWAY_ENABLED:true}
management.endpoints.web.exposure.include=health,info,prometheus
management.info.build.enabled=true
spring.security.oauth2.resourceserver.jwt.issuer-uri=${SUPABASE_AUTH_ISSUER:https://pwjnldzqwwagnxjycfaq.supabase.co/auth/v1}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${SUPABASE_AUTH_JWKS_URI:https://pwjnldzqwwagnxjycfaq.supabase.co/auth/v1/.well-known/jwks.json}
application-service.verify.base-url=${APPLICATION_SERVICE_BASE_URL:http://application:8080}
application-service.verify.connect-timeout=1s
application-service.verify.read-timeout=2s

global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    scrape_interval: 5s
    static_configs:
      - targets: [ 'localhost:9090' ]

  - job_name: 'caddy'
    static_configs:
      - targets: [ 'caddy:2019' ]


  - job_name: 'spring-services'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets:
          - 'application:8080'
          - 'chat:8080'

  - job_name: 'fastapi-services'
    metrics_path: '/metrics'
    scrape_interval: 10s
    static_configs:
      - targets:
          - 'genai:8080'
          - 'game-engine:8080'

  - job_name: 'postgres-databases'
    scrape_interval: 15s
    static_configs:
      - targets:
          - 'app-db-exporter:9187'
          - 'chat-db-exporter:9187'

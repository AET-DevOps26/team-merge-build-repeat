server {
  listen 8080;
  server_name _;
  resolver 127.0.0.11 valid=10s ipv6=off;

  root /usr/share/nginx/html;
  index index.html;

  location /application/ {
    set $application_upstream application:8080;
    rewrite ^/application/(.*)$ /$1 break;
    proxy_pass http://$application_upstream;
    proxy_set_header Host $host;
  }

  location /game-engine/ {
    set $game_engine_upstream game-engine:8080;
    rewrite ^/game-engine/(.*)$ /$1 break;
    proxy_pass http://$game_engine_upstream;
    proxy_set_header Host $host;
  }

  location /genai/ {
    set $genai_upstream genai:8080;
    rewrite ^/genai/(.*)$ /$1 break;
    proxy_pass http://$genai_upstream;
    proxy_set_header Host $host;
    proxy_connect_timeout 10s;
    proxy_send_timeout 1h;
    proxy_read_timeout 1h;
  }

  location /chat/ {
    set $chat_upstream chat:8080;
    rewrite ^/chat/(.*)$ /$1 break;
    proxy_pass http://$chat_upstream;
    proxy_set_header Host $host;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  location = /health {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "OK\n";
  }
}

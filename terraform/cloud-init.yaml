#cloud-config
package_update: true
package_upgrade: true

packages:
  - ca-certificates
  - curl

write_files:
  - path: /etc/profile.d/public-ip-addr.sh
    owner: root:root
    permissions: "0644"
    content: |
      export PUBLIC_IP_ADDR=${public_ip_address}
  - path: /etc/environment
    owner: root:root
    permissions: "0644"
    append: true
    content: |
      PUBLIC_IP_ADDR=${public_ip_address}

runcmd:
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
  - chmod a+r /etc/apt/keyrings/docker.asc
  - sh -c 'echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $${UBUNTU_CODENAME:-$VERSION_CODENAME}) stable" > /etc/apt/sources.list.d/docker.list'
  - apt-get update
  - apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
  - systemctl enable --now docker
  - usermod -aG docker ${admin_username}

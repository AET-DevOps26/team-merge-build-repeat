services:
  caddy:
    profiles: !reset []
    pull_policy: always
    restart: unless-stopped
    ports: !override
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      DOMAIN: ${DOMAIN:?Set DOMAIN for production Caddy}
    depends_on:
      frontend:
        condition: service_healthy

  frontend:
    pull_policy: always
    restart: unless-stopped

  genai:
    pull_policy: always
    restart: unless-stopped

  ollama:
    pull_policy: always
    restart: unless-stopped

  application:
    pull_policy: always
    restart: unless-stopped
    environment:
      SPRING_JPA_HIBERNATE_DDL_AUTO: none
      SPRING_JPA_SHOW_SQL: "false"
    secrets: !override
      - source: app_database_password
        target: spring.datasource.password
        mode: 0444

  chat:
    pull_policy: always
    restart: unless-stopped
    secrets: !override
      - source: chat_database_password
        target: spring.datasource.password
        mode: 0444

  application-database:
    restart: unless-stopped
    secrets: !override
      - source: app_database_password
        target: app_database_password
        mode: 0444

  game-engine:
    pull_policy: always
    restart: unless-stopped

  chat-database:
    restart: unless-stopped
    secrets: !override
      - source: chat_database_password
        target: chat_database_password
        mode: 0444

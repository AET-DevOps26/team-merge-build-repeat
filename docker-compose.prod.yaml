services:
  caddy:
    profiles: !reset []
    pull_policy: always
    restart: unless-stopped
    ports: !override
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      DOMAIN: ${DOMAIN:?Set DOMAIN for production Caddy}
    depends_on:
      frontend:
        condition: service_healthy

  frontend:
    pull_policy: always
    restart: unless-stopped

  genai:
    pull_policy: always
    restart: unless-stopped

  ollama:
    pull_policy: always
    restart: unless-stopped

  application:
    pull_policy: always
    restart: unless-stopped
    environment:
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_JPA_SHOW_SQL: "false"

  chat:
    pull_policy: always
    restart: unless-stopped

  application-database:
    restart: unless-stopped

  chat-database:
    restart: unless-stopped

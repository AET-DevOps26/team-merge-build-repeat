name: Build service images on tag

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/aet-devops26/team-merge-build-repeat

jobs:
  verify-tag-on-main:
    name: Verify tag is on main
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure tagged commit is on main
        run: |
          git fetch origin main:refs/remotes/origin/main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main

      - name: Validate release tag
        run: |
          app_version="${GITHUB_REF_NAME#v}"
          if ! printf '%s' "$app_version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'; then
            echo "Tag must use SemVer with a leading v and no build metadata, for example v1.2.3 or v1.2.3-rc.1" >&2
            exit 1
          fi

  build-and-push:
    name: Build and push ${{ matrix.service.name }}
    needs: verify-tag-on-main
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: caddy
            context: ./services/caddy
            image: caddy
          - name: frontend
            context: ./services/frontend
            image: frontend
          - name: genai
            context: ./services/genai
            image: genai
          - name: ollama
            context: ./services/ollama
            image: ollama
          - name: application
            context: ./services/application
            image: application
          - name: chat
            context: ./services/chat-database
            image: chat

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract release version
        id: version
        run: |
          app_version="${GITHUB_REF_NAME#v}"
          if ! printf '%s' "$app_version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'; then
            echo "Tag must use SemVer with a leading v and no build metadata, for example v1.2.3 or v1.2.3-rc.1" >&2
            exit 1
          fi

          is_stable=true
          if printf '%s' "$app_version" | grep -Eq '-'; then
            is_stable=false
          fi

          echo "app_version=$app_version" >> "$GITHUB_OUTPUT"
          echo "is_stable=$is_stable" >> "$GITHUB_OUTPUT"

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-${{ matrix.service.image }}
          tags: |
            type=ref,event=tag
            type=raw,value=${{ steps.version.outputs.app_version }}
            type=raw,value=latest,enable=${{ steps.version.outputs.is_stable }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.version.outputs.app_version }}
            GIT_COMMIT=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.image }}

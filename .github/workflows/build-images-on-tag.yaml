name: Build service images on tag

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/aet-devops26/team-merge-build-repeat

jobs:
  verify-tag-on-main:
    name: Verify tag is on main
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure tagged commit is on main
        run: |
          git fetch origin main:refs/remotes/origin/main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main

      - name: Validate release tag
        run: |
          app_version="${GITHUB_REF_NAME#v}"
          if ! printf '%s' "$app_version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'; then
            echo "Tag must use SemVer with a leading v and no build metadata, for example v1.2.3 or v1.2.3-rc.1" >&2
            exit 1
          fi

  build-and-push:
    name: Build and push ${{ matrix.service.name }}
    needs: verify-tag-on-main
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: caddy
            context: ./services/caddy
            image: caddy
          - name: frontend
            context: ./services/frontend
            image: frontend
          - name: genai
            context: ./services/genai
            image: genai
          - name: ollama
            context: ./services/ollama
            image: ollama
          - name: application
            context: ./services/application
            image: application
          - name: chat
            context: ./services/chat-database
            image: chat
          - name: game-engine
            context: ./services/game-engine
            image: game-engine

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract release version
        id: version
        run: |
          app_version="${GITHUB_REF_NAME#v}"
          if ! printf '%s' "$app_version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'; then
            echo "Tag must use SemVer with a leading v and no build metadata, for example v1.2.3 or v1.2.3-rc.1" >&2
            exit 1
          fi

          is_stable=true
          if printf '%s' "$app_version" | grep -Eq '-'; then
            is_stable=false
          fi

          echo "app_version=$app_version" >> "$GITHUB_OUTPUT"
          echo "is_stable=$is_stable" >> "$GITHUB_OUTPUT"

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-${{ matrix.service.image }}
          tags: |
            type=ref,event=tag
            type=raw,value=${{ steps.version.outputs.app_version }}
            type=raw,value=latest,enable=${{ steps.version.outputs.is_stable }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.version.outputs.app_version }}
            GIT_COMMIT=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.image }}

  deploy-kubernetes:
    name: Deploy Kubernetes stack
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    env:
      APP_DATABASE_NAME: ${{ vars.APP_DATABASE_NAME || 'game_database' }}
      APP_DATABASE_USER: ${{ vars.APP_DATABASE_USER || 'app_user' }}
      CHAT_DATABASE_NAME: ${{ vars.CHAT_DATABASE_NAME || 'chat_database' }}
      CHAT_DATABASE_USER: ${{ vars.CHAT_DATABASE_USER || 'chat_user' }}
      CHAT_DATABASE_SPRING_PROFILE: ${{ vars.CHAT_DATABASE_SPRING_PROFILE || 'docker' }}
      APPLICATION_CONTEXT_PATH: ${{ vars.APPLICATION_CONTEXT_PATH || '/application' }}
      CHAT_CONTEXT_PATH: ${{ vars.CHAT_CONTEXT_PATH || '/chat' }}
      LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'openai' }}
      GENAI_ROOT_PATH: ${{ vars.GENAI_ROOT_PATH || '/genai' }}
      GAME_ENGINE_ROOT_PATH: ${{ vars.GAME_ENGINE_ROOT_PATH || '/game-engine' }}
      OLLAMA_MODEL: ${{ vars.OLLAMA_MODEL || 'gemma4:e4b' }}
      OLLAMA_CONTEXT_LENGTH: ${{ vars.OLLAMA_CONTEXT_LENGTH || '8192' }}
      OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL || 'https://logos.aet.cit.tum.de:8080/v1' }}
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'openai/gpt-oss-120b' }}
      APP_DATABASE_PASSWORD: ${{ secrets.APP_DATABASE_PASSWORD }}
      CHAT_DATABASE_PASSWORD: ${{ secrets.CHAT_DATABASE_PASSWORD }}
      LOGOS_KEY: ${{ secrets.LOGOS_KEY }}
      KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Extract release version
        id: version
        shell: bash
        run: |
          app_version="${GITHUB_REF_NAME#v}"
          if ! printf '%s' "$app_version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'; then
            echo "Tag must use SemVer with a leading v and no build metadata, for example v1.2.3 or v1.2.3-rc.1" >&2
            exit 1
          fi
          echo "app_version=$app_version" >> "$GITHUB_OUTPUT"

      - name: Validate deployment configuration
        shell: bash
        run: |
          : "${APP_DATABASE_PASSWORD:?Set APP_DATABASE_PASSWORD as a production secret.}"
          : "${CHAT_DATABASE_PASSWORD:?Set CHAT_DATABASE_PASSWORD as a production secret.}"
          : "${LOGOS_KEY:?Set LOGOS_KEY as a production secret.}"
          : "${KUBE_CONFIG:?Set KUBE_CONFIG as a production secret containing a kubeconfig file.}"

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure Kubernetes access
        shell: bash
        run: |
          install -m 0700 -d "$HOME/.kube"
          printf '%s\n' "$KUBE_CONFIG" > "$HOME/.kube/config"
          chmod 0600 "$HOME/.kube/config"
          kubectl version --client
          for resource in configmaps secrets persistentvolumeclaims services deployments.apps statefulsets.apps ingresses.networking.k8s.io; do
            for verb in get create patch; do
              kubectl auth can-i "$verb" "$resource" --namespace merge-build-repeat --quiet
            done
          done
          for resource in pods services deployments.apps statefulsets.apps ingresses.networking.k8s.io; do
            kubectl auth can-i list "$resource" --namespace merge-build-repeat --quiet
          done
          kubectl auth can-i watch deployments.apps --namespace merge-build-repeat --quiet
          kubectl auth can-i watch statefulsets.apps --namespace merge-build-repeat --quiet

      - name: Apply runtime configuration
        shell: bash
        run: |
          kubectl apply -f k8s/base/namespace.yaml || \
            echo "Skipping namespace apply; assuming merge-build-repeat already exists."

          kubectl -n merge-build-repeat create secret generic app-secrets \
            --from-literal=app_database_password="$APP_DATABASE_PASSWORD" \
            --from-literal=chat_database_password="$CHAT_DATABASE_PASSWORD" \
            --from-literal=logos_key="$LOGOS_KEY" \
            --dry-run=client \
            -o yaml | kubectl apply -f -

          kubectl -n merge-build-repeat create configmap app-config \
            --from-literal=APP_DATABASE_NAME="$APP_DATABASE_NAME" \
            --from-literal=APP_DATABASE_USER="$APP_DATABASE_USER" \
            --from-literal=CHAT_DATABASE_NAME="$CHAT_DATABASE_NAME" \
            --from-literal=CHAT_DATABASE_USER="$CHAT_DATABASE_USER" \
            --from-literal=CHAT_DATABASE_SPRING_PROFILE="$CHAT_DATABASE_SPRING_PROFILE" \
            --from-literal=APPLICATION_CONTEXT_PATH="$APPLICATION_CONTEXT_PATH" \
            --from-literal=CHAT_CONTEXT_PATH="$CHAT_CONTEXT_PATH" \
            --from-literal=LLM_PROVIDER="$LLM_PROVIDER" \
            --from-literal=GENAI_ROOT_PATH="$GENAI_ROOT_PATH" \
            --from-literal=GAME_ENGINE_ROOT_PATH="$GAME_ENGINE_ROOT_PATH" \
            --from-literal=OLLAMA_MODEL="$OLLAMA_MODEL" \
            --from-literal=OLLAMA_CONTEXT_LENGTH="$OLLAMA_CONTEXT_LENGTH" \
            --from-literal=OPENAI_BASE_URL="$OPENAI_BASE_URL" \
            --from-literal=OPENAI_MODEL="$OPENAI_MODEL" \
            --dry-run=client \
            -o yaml | kubectl apply -f -

      - name: Deploy Kubernetes manifests
        shell: bash
        run: |
          release_render_dir="$(mktemp -d)"
          cp -R k8s "$release_render_dir/k8s"
          sed -i "s/newTag: RELEASE_TAG/newTag: ${{ steps.version.outputs.app_version }}/g" \
            "$release_render_dir/k8s/overlays/release/kustomization.yaml"
          kubectl kustomize "$release_render_dir/k8s/overlays/release" | kubectl apply -f -

      - name: Wait for rollout
        shell: bash
        run: |
          dump_diagnostics() {
            kubectl -n merge-build-repeat get pods,replicasets,deployments,statefulsets,svc,ingress
            kubectl -n merge-build-repeat describe deployment genai
            kubectl -n merge-build-repeat get events --sort-by='.lastTimestamp'
          }
          trap dump_diagnostics ERR

          kubectl -n merge-build-repeat rollout status statefulset/application-database --timeout=5m
          kubectl -n merge-build-repeat rollout status statefulset/chat-database --timeout=5m
          kubectl -n merge-build-repeat rollout status deployment/application --timeout=5m
          kubectl -n merge-build-repeat rollout status deployment/chat --timeout=5m
          kubectl -n merge-build-repeat rollout status deployment/genai --timeout=5m
          kubectl -n merge-build-repeat rollout status deployment/game-engine --timeout=5m
          kubectl -n merge-build-repeat rollout status deployment/frontend --timeout=5m
          kubectl -n merge-build-repeat get pods,svc,ingress

name: Java CI with Gradle

on:
  push:
    branches: [ "test/*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          build-root-directory: services/application

      - name: Grant execute permission for gradlew
        run: chmod +x ./services/application/gradlew

      - name: Run unit tests
        run: ./gradlew test
        working-directory: services/application

      - name: Publish Test Report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: gradle-test-reports
          path: services/application/build/reports/tests/test/

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'services/genai/requirements*.txt'

      - name: Install Python dependencies
          run: |
            python -m pip install --upgrade pip
            if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
            if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
            pip install pytest langchain-core
          working-directory: services/genai

      - name: Run Python unit tests
          run: |
            python -m pytest
            working-directory: services/genai

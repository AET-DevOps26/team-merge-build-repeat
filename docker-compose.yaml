services:
  caddy:
    image: ghcr.io/aet-devops26/team-merge-build-repeat-caddy:${IMAGE_TAG:-latest}
    profiles: ["proxy"]
    depends_on:
      frontend:
        condition: service_healthy
    volumes:
      - caddy_data:/data
      - caddy_config:/config

  frontend:
    image: ghcr.io/aet-devops26/team-merge-build-repeat-frontend:${IMAGE_TAG:-latest}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  genai:
    image: ghcr.io/aet-devops26/team-merge-build-repeat-genai:${IMAGE_TAG:-latest}
    environment:
      CHAT_SERVICE_URL: ${CHAT_SERVICE_URL:-http://chat:8080}
      GAME_SERVICE_URL: ${GAME_SERVICE_URL:-http://application:8080${APPLICATION_CONTEXT_PATH:-}}
      LLM_PROVIDER: openai
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://logos.aet.cit.tum.de/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-openai/gpt-oss-120b}
      OPENAI_API_KEY_FILE: /run/secrets/logos_key
      GENAI_ROOT_PATH: ${GENAI_ROOT_PATH:-/}
      GENAI_DEBUG: ${GENAI_DEBUG:-false}
    secrets:
      - source: logos_key
        target: logos_key
    depends_on:
      application:
        condition: service_healthy
      chat:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  application-database:
    image: postgres:17
    environment:
      POSTGRES_DB: ${APP_DATABASE_NAME:-game_database}
      POSTGRES_USER: ${APP_DATABASE_USER:-postgres}
      POSTGRES_PASSWORD_FILE: /run/secrets/app_database_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    secrets:
      - source: app_database_password
        target: app_database_password
    healthcheck:
      test:
        ["CMD-SHELL", 'pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"']
      interval: 10s
      timeout: 5s
      retries: 5

  application:
    image: ghcr.io/aet-devops26/team-merge-build-repeat-application:${IMAGE_TAG:-latest}
    environment:
      # Overrides the application.yaml URL to point to the db container
      SERVER_SERVLET_CONTEXT_PATH: ${APPLICATION_CONTEXT_PATH:-}
      SPRING_CONFIG_IMPORT: optional:configtree:/run/secrets/
      SPRING_DATASOURCE_URL: jdbc:postgresql://application-database:5432/${APP_DATABASE_NAME:-game_database}
      SPRING_DATASOURCE_USERNAME: ${APP_DATABASE_USER:-postgres}
    depends_on:
      application-database:
        condition: service_healthy
    secrets:
      - source: app_database_password
        target: spring.datasource.password
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'curl -fsS "http://localhost:8080$${SERVER_SERVLET_CONTEXT_PATH:-}/actuator/health"',
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s

  chat:
    image: ghcr.io/aet-devops26/team-merge-build-repeat-chat:${IMAGE_TAG:-latest}
    depends_on:
      chat-database:
        condition: service_healthy
    environment:
      SERVER_SERVLET_CONTEXT_PATH: ${CHAT_CONTEXT_PATH:-}
      SPRING_CONFIG_IMPORT: optional:configtree:/run/secrets/
      SPRING_DATASOURCE_URL: jdbc:postgresql://chat-database:5432/${CHAT_DATABASE_NAME:-chat_database}
      SPRING_DATASOURCE_USERNAME: ${CHAT_DATABASE_USER:-chat_user}
      SPRING_FLYWAY_ENABLED: "true"
      SPRING_PROFILES_ACTIVE: ${CHAT_DATABASE_SPRING_PROFILE:-docker}
      SUPABASE_AUTH_ISSUER: ${SUPABASE_AUTH_ISSUER:-https://pwjnldzqwwagnxjycfaq.supabase.co/auth/v1}
      SUPABASE_AUTH_JWKS_URI: ${SUPABASE_AUTH_JWKS_URI:-https://pwjnldzqwwagnxjycfaq.supabase.co/auth/v1/.well-known/jwks.json}
    secrets:
      - source: chat_database_password
        target: spring.datasource.password
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'curl -fsS "http://localhost:8080$${SERVER_SERVLET_CONTEXT_PATH:-}/actuator/health"',
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s

  chat-database:
    image: postgres:17
    environment:
      POSTGRES_DB: ${CHAT_DATABASE_NAME:-chat_database}
      POSTGRES_USER: ${CHAT_DATABASE_USER:-chat_user}
      POSTGRES_PASSWORD_FILE: /run/secrets/chat_database_password
    volumes:
      - chat-database-postgres-data:/var/lib/postgresql/data
    secrets:
      - source: chat_database_password
        target: chat_database_password
    healthcheck:
      test:
        ["CMD-SHELL", 'pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"']
      interval: 10s
      timeout: 5s
      retries: 5

  game-engine:
    image: ghcr.io/aet-devops26/team-merge-build-repeat-game-engine:${IMAGE_TAG:-latest}
    environment:
      GAME_ENGINE_ROOT_PATH: ${GAME_ENGINE_ROOT_PATH:-/}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./services/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  app-db-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    environment:
      DATA_SOURCE_URI: "application-database:5432/${APP_DATABASE_NAME:-game_database}?sslmode=disable"
      DATA_SOURCE_USER: "${APP_DATABASE_USER:-postgres}"
      DATA_SOURCE_PASS_FILE: "/run/secrets/app_database_password"
    secrets:
      - app_database_password
    depends_on:
      application-database:
        condition: service_healthy

  chat-db-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    environment:
      DATA_SOURCE_URI: "chat-database:5432/${CHAT_DATABASE_NAME:-chat_database}?sslmode=disable"
      DATA_SOURCE_USER: "${CHAT_DATABASE_USER:-chat_user}"
      DATA_SOURCE_PASS_FILE: "/run/secrets/chat_database_password"
    secrets:
      - chat_database_password
    depends_on:
      chat-database:
        condition: service_healthy

secrets:
  logos_key:
    file: ${LOGOS_KEY_FILE:-./secrets/logos_key}
  app_database_password:
    file: ${APP_DATABASE_PASSWORD_FILE:-./secrets/app_database_password}
  chat_database_password:
    file: ${CHAT_DATABASE_PASSWORD_FILE:-./secrets/chat_database_password}

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
  chat-database-postgres-data:
  prometheus_data:

services:
  db:
    image: postgres:16
    container_name: postgres-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: yourpassword
      POSTGRES_DB: game_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: application-server/Dockerfile
    container_name: spring-boot-app
    ports:
      - "8080:8080"
    environment:
      # Overrides the application.yaml URL to point to the db container
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/game_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: yourpassword
    depends_on:
      - db

volumes:
  postgres_data:

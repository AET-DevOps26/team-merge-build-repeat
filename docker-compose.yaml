services:
  caddy:
    image: ghcr.io/aet-devops26/team-merge-build-repeat-caddy:${IMAGE_TAG:-latest}
    profiles: ["proxy"]
    depends_on:
      frontend:
        condition: service_healthy
    volumes:
      - caddy_data:/data
      - caddy_config:/config

  frontend:
    image: ghcr.io/aet-devops26/team-merge-build-repeat-frontend:${IMAGE_TAG:-latest}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  genai:
    image: ghcr.io/aet-devops26/team-merge-build-repeat-genai:${IMAGE_TAG:-latest}
    environment:
      CHAT_SERVICE_URL: ${CHAT_SERVICE_URL:-http://chat:8080}
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma4:e4b}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://logos.aet.cit.tum.de:8080/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-openai/gpt-oss-120b}
      OPENAI_API_KEY_FILE: /run/secrets/logos_key
    secrets:
      - source: logos_key
        target: logos_key
    depends_on:
      ollama:
        condition: service_healthy
        required: false
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  ollama:
    image: ghcr.io/aet-devops26/team-merge-build-repeat-ollama:${IMAGE_TAG:-latest}
    profiles: ["local-llm"]
    volumes:
      - ollama-data:/root/.ollama
    environment:
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma4:e4b}
      OLLAMA_CONTEXT_LENGTH: ${OLLAMA_CONTEXT_LENGTH:-8192}
    healthcheck:
      test: ["CMD-SHELL", 'ollama show "$$OLLAMA_MODEL" >/dev/null 2>&1']
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 10s

  application-database:
    image: postgres:17
    environment:
      POSTGRES_DB: ${APP_DATABASE_NAME:-game_database}
      POSTGRES_USER: ${APP_DATABASE_USER:-postgres}
      POSTGRES_PASSWORD_FILE: /run/secrets/app_database_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    secrets:
      - source: app_database_password
        target: app_database_password
    healthcheck:
      test:
        ["CMD-SHELL", 'pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"']
      interval: 10s
      timeout: 5s
      retries: 5

  application:
    image: ghcr.io/aet-devops26/team-merge-build-repeat-application:${IMAGE_TAG:-latest}
    environment:
      # Overrides the application.yaml URL to point to the db container
      SPRING_CONFIG_IMPORT: optional:configtree:/run/secrets/
      SPRING_DATASOURCE_URL: jdbc:postgresql://application-database:5432/${APP_DATABASE_NAME:-game_database}
      SPRING_DATASOURCE_USERNAME: ${APP_DATABASE_USER:-postgres}
    depends_on:
      application-database:
        condition: service_healthy
    secrets:
      - source: app_database_password
        target: spring.datasource.password
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s

  chat:
    image: ghcr.io/aet-devops26/team-merge-build-repeat-chat:${IMAGE_TAG:-latest}
    depends_on:
      chat-database:
        condition: service_healthy
    environment:
      SPRING_CONFIG_IMPORT: optional:configtree:/run/secrets/
      SPRING_DATASOURCE_URL: jdbc:postgresql://chat-database:5432/${CHAT_DATABASE_NAME:-chat_database}
      SPRING_DATASOURCE_USERNAME: ${CHAT_DATABASE_USER:-chat_user}
      SPRING_FLYWAY_ENABLED: "true"
      SPRING_PROFILES_ACTIVE: ${CHAT_DATABASE_SPRING_PROFILE:-docker}
    secrets:
      - source: chat_database_password
        target: spring.datasource.password
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s

  chat-database:
    image: postgres:17
    environment:
      POSTGRES_DB: ${CHAT_DATABASE_NAME:-chat_database}
      POSTGRES_USER: ${CHAT_DATABASE_USER:-chat_user}
      POSTGRES_PASSWORD_FILE: /run/secrets/chat_database_password
    volumes:
      - chat-database-postgres-data:/var/lib/postgresql/data
    secrets:
      - source: chat_database_password
        target: chat_database_password
    healthcheck:
      test:
        ["CMD-SHELL", 'pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"']
      interval: 10s
      timeout: 5s
      retries: 5

secrets:
  logos_key:
    file: ${LOGOS_KEY_FILE:-./secrets/logos_key}
  app_database_password:
    file: ${APP_DATABASE_PASSWORD_FILE:-./secrets/app_database_password}
  chat_database_password:
    file: ${CHAT_DATABASE_PASSWORD_FILE:-./secrets/chat_database_password}

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
  chat-database-postgres-data:
  ollama-data:
